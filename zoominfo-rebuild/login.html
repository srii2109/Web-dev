<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementum - Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="reveal-up is-visible">
    
    <!-- Ambient Glow Background -->
    <div class="ambient-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <!-- Header Navigation (Minimal) -->
    <header class="site-header" id="navbar">
        <div class="header-container" style="justify-content: center;">
            <a href="index.html" class="logo-link transition-link">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <span class="logo-text">Elementum</span>
            </a>
        </div>
    </header>

    <main class="page-content auth-wrapper">
        <div class="auth-container glass-card reveal-up delay-1 is-visible">
            <h1>Welcome back</h1>
            <p>Enter your credentials to access your workspace.</p>
            
            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <label for="password">Password</label>
                        <a href="#" style="font-size: 0.8rem; color: var(--text-secondary);">Forgot password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="cta-btn primary full-width glow-effect" style="margin-top: 1rem; padding: 0.8rem;">
                    Sign In
                </button>
                
                <button type="button" class="cta-btn secondary full-width" style="margin-top: 0.5rem; display: flex; gap: 0.5rem; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                    Continue with Google
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="#" class="transition-link">Request access</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
